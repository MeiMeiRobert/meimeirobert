<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meimei &amp; robert</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8CGN6S3N3E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8CGN6S3N3E');
  </script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Blurred background — visible after curtain lifts */
    .bg {
      position: fixed;
      inset: 0;
      background: url('splash_image.jpg') center / cover no-repeat;
      filter: blur(28px) brightness(0.55) saturate(1.2);
      transform: scale(1.12);
      z-index: 0;
    }

    /*
      Full-screen splash overlay — this entire layer curtains upward.
      Hold for 1s, then rise over 1.2s.
    */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      clip-path: inset(0 0 0% 0);
      animation: rise 1.2s cubic-bezier(0.76, 0, 0.24, 1) 1s forwards;
      overflow: hidden;
    }

    /* Blurred full-page background inside the curtain */
    .stage::before {
      content: '';
      position: absolute;
      inset: -30px;
      background: url('splash_image.jpg') center / cover no-repeat;
      filter: blur(28px) brightness(0.55) saturate(1.2);
      z-index: 0;
    }

    .stage > * {
      position: relative;
      z-index: 1;
    }

    /* Centred sharp image at ~50% of viewport */
    .splash-img {
      width: min(50vw, 50vh);
      border-radius: 16px;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.65);
      display: block;
      /* frosted-glass surround using a backdrop that lets the stage bg show through */
      outline: 9999px solid rgba(0, 0, 0, 0); /* no extra border, shape only */
    }

    @keyframes rise {
      0%   { clip-path: inset(0 0 0%   0); }
      100% { clip-path: inset(0 0 100% 0); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="stage">
    <img class="splash-img" src="splash_image.jpg" alt="meimei &amp; robert">
  </div>

  <script>
    // Redirect after hold (1000ms) + curtain animation (1200ms) + small buffer
    setTimeout(function () {
      window.location.replace("https://www.instagram.com/meimeiandrobert/");
    }, 2400);
  </script>
</body>
</html>
